<style>

  header { background: var(--ink); padding: 2.5rem 2rem 2rem; position: relative; overflow: hidden; }

  .header-sub { font-size: 0.8rem; color: rgba(250,246,239,0.5); letter-spacing: 0.05em; }

  .filter-bar { padding: 1.2rem 1.5rem; background: var(--warm-white); border-bottom: 1px solid rgba(92,61,30,0.1); position: sticky; top: 0; z-index: 10; display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 0.45rem 1rem; border-radius: 999px; border: 1.5px solid transparent; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; background: transparent; letter-spacing: 0.03em; }
  .filter-btn.all { border-color: var(--ink); color: var(--ink); }
  .filter-btn.all.active, .filter-btn.all:hover { background: var(--ink); color: var(--cream); }
  .filter-btn.rice { border-color: var(--mode-rice); color: var(--mode-rice); }
  .filter-btn.rice.active, .filter-btn.rice:hover { background: var(--mode-rice); color: white; }
  .filter-btn.quick { border-color: var(--mode-quick); color: var(--mode-quick); }
  .filter-btn.quick.active, .filter-btn.quick:hover { background: var(--mode-quick); color: white; }
  .filter-btn.congee { border-color: var(--mode-congee); color: var(--mode-congee); }
  .filter-btn.congee.active, .filter-btn.congee:hover { background: var(--mode-congee); color: white; }
  .filter-btn.stew { border-color: var(--mode-stew); color: var(--mode-stew); }
  .filter-btn.stew.active, .filter-btn.stew:hover { background: var(--mode-stew); color: white; }

  .recipe-count { padding: 0.8rem 1.5rem 0; font-size: 0.72rem; color: rgba(26,18,8,0.35); letter-spacing: 0.05em; }
  .grid { padding: 1rem 1.5rem 1.5rem; display: grid; grid-template-columns: 1fr; gap: 1.2rem; }

  .card { background: var(--warm-white); border-radius: 16px; overflow: hidden; border: 1px solid rgba(92,61,30,0.08); transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(26,18,8,0.1); }

  .card-top { padding: 1.2rem 1.2rem 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .mode-badge { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; padding: 0.25rem 0.65rem; border-radius: 999px; color: white; }
  .badge-rice { background: var(--mode-rice); }
  .badge-quick { background: var(--mode-quick); }
  .badge-congee { background: var(--mode-congee); }
  .badge-stew { background: var(--mode-stew); }
  .card-emoji { font-size: 1.8rem; line-height: 1; }

  .card-body { padding: 0.75rem 1.2rem 1rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.25rem; line-height: 1.3; }
  .card-desc { font-size: 0.8rem; color: rgba(26,18,8,0.55); margin-bottom: 0.9rem; line-height: 1.5; }

  .meta-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.5; display: inline-block; margin-right: 0.3rem; }

  .nutrition-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--cream);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 0.9rem;
    border: 1px solid rgba(26,18,8,0.06);
  }
  .nutr-cell {
    padding: 0.5rem 0.3rem;
    text-align: center;
    border-right: 1px solid rgba(26,18,8,0.06);
  }
  .nutr-cell:last-child { border-right: none; }
  .nutr-value { font-size: 0.82rem; font-weight: 500; color: var(--ink); display: block; line-height: 1.2; }
  .nutr-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,18,8,0.35); display: block; margin-top: 0.1rem; }
  .nutr-cell.kcal .nutr-value { color: var(--amber); }

  .servings-row { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border-radius: 10px; padding: 0.6rem 0.8rem; margin-bottom: 0.9rem; }
  .servings-label { font-size: 0.75rem; color: rgba(26,18,8,0.5); }
  .servings-control { display: flex; align-items: center; gap: 0.6rem; }
  .srv-btn { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid rgba(26,18,8,0.2); background: white; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; color: var(--ink); transition: all 0.15s; }
  .srv-btn:hover { border-color: var(--amber); color: var(--amber); }
  .srv-count { font-size: 0.9rem; font-weight: 500; min-width: 20px; text-align: center; }

  .ingredients-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,18,8,0.4); margin-bottom: 0.5rem; font-weight: 500; }
  .ingredients-list { list-style: none; }
  .ingredients-list li { font-size: 0.82rem; padding: 0.3rem 0; border-bottom: 1px solid rgba(26,18,8,0.06); display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
  .ingredients-list li:last-child { border-bottom: none; }
  .ing-name { color: rgba(26,18,8,0.7); }
  .ing-amount { font-weight: 500; color: var(--ink); white-space: nowrap; }

  .expand-btn { width: 100%; padding: 0.65rem; background: none; border: none; border-top: 1px solid rgba(26,18,8,0.07); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: rgba(26,18,8,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.4rem; transition: color 0.2s; letter-spacing: 0.05em; }
  .expand-btn:hover { color: var(--amber); }
  .expand-icon { transition: transform 0.2s; font-size: 0.65rem; }
  .card.expanded .expand-icon { transform: rotate(180deg); }
  .collapsible { display: none; padding: 0 1.2rem 1rem; }
  .card.expanded .collapsible { display: block; }

  .steps-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,18,8,0.4); margin: 0.8rem 0 0.5rem; font-weight: 500; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; font-size: 0.82rem; line-height: 1.55; padding: 0.4rem 0 0.4rem 2rem; border-bottom: 1px solid rgba(26,18,8,0.06); position: relative; color: rgba(26,18,8,0.75); }
  .steps-list li:last-child { border-bottom: none; }
  .steps-list li::before { content: counter(steps); position: absolute; left: 0; top: 0.4rem; width: 18px; height: 18px; border-radius: 50%; background: var(--amber); color: white; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }

  .tip-box { margin-top: 0.8rem; padding: 0.65rem 0.8rem; background: rgba(200,135,42,0.08); border-left: 3px solid var(--amber); border-radius: 0 8px 8px 0; font-size: 0.78rem; color: rgba(26,18,8,0.65); line-height: 1.5; }
  .tip-box strong { color: var(--amber); font-weight: 500; }
  .nutr-note { font-size: 0.68rem; color: rgba(26,18,8,0.3); text-align: center; margin-top: 0.5rem; font-style: italic; }

  footer { text-align: center; padding: 2rem 1.5rem; font-size: 0.72rem; color: rgba(26,18,8,0.3); border-top: 1px solid rgba(26,18,8,0.07); letter-spacing: 0.05em; }
</style>
</head>

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('header-count').textContent = `4 cooking modes · scalable servings · ${recipes.length} recipes`;
  updateCount('all');
  recipes.forEach(r => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.mode = r.mode;
    el.dataset.id = r.id;
    el.dataset.servings = r.baseServings;
    const modeLabel = {rice:'Rice',quick:'Quick Rice',congee:'Congee',stew:'Stew'}[r.mode];
    el.innerHTML = `
      <div class="card-top">
        <span class="mode-badge badge-${r.mode}">${modeLabel}</span>
        <span class="card-emoji">${r.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${r.title}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-meta">
          <span>⏱ ${r.time}</span>
          <span><span class="meta-dot"></span>${r.difficulty}</span>
        </div>
        <div class="nutrition-bar" id="nutr-${r.id}">${renderNutr(r, r.baseServings)}</div>
        <div class="servings-row">
          <span class="servings-label">Servings</span>
          <div class="servings-control">
            <button class="srv-btn" onclick="changeSrv(${r.id},-1,event)">−</button>
            <span class="srv-count" id="srv-${r.id}">${r.baseServings}</span>
            <button class="srv-btn" onclick="changeSrv(${r.id},1,event)">+</button>
          </div>
        </div>
        <div class="ingredients-title">Ingredients</div>
        <ul class="ingredients-list" id="ing-${r.id}">${renderIng(r, r.baseServings)}</ul>
      </div>
      <button class="expand-btn" onclick="toggleExpand(${r.id},event)">
        Steps & Tips <span class="expand-icon">▼</span>
      </button>
      <div class="collapsible" id="col-${r.id}">
        <div class="steps-title">Method</div>
        <ol class="steps-list">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
        <div class="tip-box"><strong>Tip:</strong> ${r.tip}</div>
        <p class="nutr-note">Nutritional values are estimates per serving based on standard ingredient data.</p>
      </div>`;
    grid.appendChild(el);
  });
}

function renderNutr(r, servings) {
  const ratio = servings / r.baseServings;
  const n = r.nutrition;
  return `
    <div class="nutr-cell kcal"><span class="nutr-value">${Math.round(n.kcal * ratio)}</span><span class="nutr-label">kcal</span></div>
    <div class="nutr-cell"><span class="nutr-value">${Math.round(n.protein * ratio)}g</span><span class="nutr-label">protein</span></div>
    <div class="nutr-cell"><span class="nutr-value">${Math.round(n.carbs * ratio)}g</span><span class="nutr-label">carbs</span></div>
    <div class="nutr-cell"><span class="nutr-value">${Math.round(n.fat * ratio)}g</span><span class="nutr-label">fat</span></div>
    <div class="nutr-cell"><span class="nutr-value">${Math.round(n.fibre * ratio)}g</span><span class="nutr-label">fibre</span></div>`;
}

function renderIng(r, servings) {
  const ratio = servings / r.baseServings;
  return r.ingredients.map(ing => {
    if (ing.unit === 'to taste') return `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">to taste</span></li>`;
    const raw = ing.base * ratio;
    const fmt = formatAmt(raw, ing.unit);
    const u = ing.unit ? ' ' + ing.unit : '';
    return `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">${fmt}${u}</span></li>`;
  }).join('');
}

function formatAmt(n, unit) {
  if (n === 0) return '0';
  if (unit === 'g' || unit === 'ml') {
    if (n < 5) return (Math.round(n * 2) / 2).toString();
    if (n < 20) return Math.round(n).toString();
    if (n < 100) return (Math.round(n / 5) * 5).toString();
    return (Math.round(n / 10) * 10).toString();
  }
  const rounded = Math.round(n * 4) / 4;
  const whole = Math.floor(rounded);
  const frac = rounded - whole;
  const fracMap = {0:'',0.25:'¼',0.5:'½',0.75:'¾'};
  const fracStr = fracMap[frac] ?? '';
  if (whole === 0) return fracStr || '<1';
  return whole + (fracStr ? ' '+fracStr : '');
}

function changeSrv(id, delta, e) {
  e.stopPropagation();
  const card = document.querySelector(`[data-id="${id}"]`);
  let s = parseInt(card.dataset.servings) + delta;
  if (s < 1) s = 1;
  if (s > 6) s = 6;
  card.dataset.servings = s;
  document.getElementById(`srv-${id}`).textContent = s;
  const r = recipes.find(x=>x.id===id);
  document.getElementById(`ing-${id}`).innerHTML = renderIng(r, s);
  document.getElementById(`nutr-${id}`).innerHTML = renderNutr(r, s);
}

function toggleExpand(id, e) {
  e.stopPropagation();
  document.querySelector(`[data-id="${id}"]`).classList.toggle('expanded');
}

function updateCount(mode) {
  const n = mode === 'all' ? recipes.length : recipes.filter(r=>r.mode===mode).length;
  document.getElementById('recipe-count').textContent = `Showing ${n} recipe${n!==1?'s':''}`;
}

function filter(mode, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card=>{
    card.classList.toggle('hidden', mode !== 'all' && card.dataset.mode !== mode);
  });
  updateCount(mode);
}

renderCards();
</script>
</body>
</html>
